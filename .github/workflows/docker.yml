name: Docker Build & Push

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  REPO_OWNER: kanlka  # Your lowercase GitHub username
  REPO_NAME: ctf-platform  # Your lowercase repo name
  FRONTEND_IMAGE: ${{ env.REPO_NAME }}-frontend
  BACKEND_IMAGE: ${{ env.REPO_NAME }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Build Frontend
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile  # Explicitly reference the Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.FRONTEND_IMAGE }}:latest
          labels: "app=frontend"

      - name: Build Backend
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile  # Explicitly reference the Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.BACKEND_IMAGE }}:latest
          labels: "app=backend"