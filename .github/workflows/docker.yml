name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # 👈 Manual trigger support added

env:
  REGISTRY: ghcr.io
  REPO_OWNER: "kanlka"  # 🔁 Make sure this matches your GitHub username
  REPO_NAME: "ctf-platform"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}-frontend:latest
          labels: "app=frontend"
          cache-from: type=gha  # Optional: Docker cache
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}-backend:latest
          labels: "app=backend"
          cache-from: type=gha  # Optional: Docker cache
          cache-to: type=gha,mode=max
